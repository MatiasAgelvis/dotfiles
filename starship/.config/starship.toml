"$schema" = 'https://starship.rs/config-schema.json'

# Use custom format
format = '''$os$hostname$username$directory $fill $all
$character'''

# right_format = ''''''

# Inserts a blank line between shell prompts
add_newline = true

[line_break]
disabled = true

# в”Җв”Җ Top line components в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вқҜ](green)"
error_symbol = "[вқҜ](red)"
vicmd_symbol = "[вқ®](blue)"

[cmd_duration]
min_time = 0
format = "уұҺ« $duration "
style = ""

[time]
disabled = false
format = '$time'
time_format = '%T'

[username]
style_user = 'bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = false
show_always = false
# aliases = { "matiasagelvis" = "MAD" }

[os]
format = "[$symbol]($style)"
style = "bold blue"
disabled = false

[directory]
read_only = " у°Ңҫ"
truncation_length = 8
truncate_to_repo = false
before_repo_root_style = 'dimmed'
repo_root_style = 'blue bold'
format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)'

[fill]
symbol = "в”Җ"
style = "dimmed"

# в”Җв”Җ Default prompt components в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

